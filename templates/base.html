{{define "base"}}
<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Richard Justke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/" {{if eq .Page "home"}}class="active"{{end}}>home</a>
    <a href="/work" {{if eq .Page "work"}}class="active"{{end}}>work</a>
  </div>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">
    <i class="fas fa-circle-half-stroke"></i>
  </button>
</nav>

  <main>
    {{if eq .Page "home"}}{{template "home" .}}{{else if eq .Page "work"}}{{template "work" .}}{{end}}
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
{{end}}
